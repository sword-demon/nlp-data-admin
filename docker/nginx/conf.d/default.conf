# ==========================================================
# NLP Data Admin 默认站点
#   80  -> 前端 SPA + /api 反代 + /api/**/sse 流式代理
# HTTPS 由运维在此文件基础上追加 `server { listen 443 ssl; ... }`，详见 docs/deployment.md
# ==========================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --------- 1. 前端静态资源缓存 ---------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # --------- 2. SSE 专用 location（必须放在 /api 之前以便正则优先匹配） ---------
    # 命中：/api/workshop/*/sse、/api/chat/stream 等
    location ~ ^/api/(workshop/[^/]+/sse|chat/stream)$ {
        proxy_pass              http://nlp_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection      '';

        # SSE 关键：关闭代理层缓冲
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
        add_header              X-Accel-Buffering no;

        # 长连接超时（AI 生成单次 2~3 分钟完全可能）
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        proxy_connect_timeout   30s;
    }

    # --------- 3. 普通 API 反代 ---------
    location /api/ {
        proxy_pass              http://nlp_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection      '';

        proxy_connect_timeout   15s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;

        # 较大响应（如文章下载）可留给后端直出
        proxy_buffering         on;
    }

    # --------- 4. SPA 路由 fallback ---------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------- 5. 错误页 ---------
    error_page  404              /index.html;
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
