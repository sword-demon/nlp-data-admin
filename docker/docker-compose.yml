services:
  nlp-mysql:
    image: mysql:8.0
    container_name: nlp-mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-nlp_root_2024}
      MYSQL_DATABASE: nlp_content
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-nlp_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nlp-redis:
    image: redis:7-alpine
    container_name: nlp-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nlp_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 开发模式：挂载源码，entrypoint 按需 composer install；热更新通过 Hyperf Watcher（容器外手动启动）
  # 生产模式：见 docker-compose.prod.yml，使用 backend/Dockerfile.prod COPY 源码与 vendor
  nlp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlp-backend
    restart: unless-stopped
    ports:
      - "9501:9501"
    volumes:
      - ../backend:/opt/www
    environment:
      APP_ENV: dev
      DB_HOST: nlp-mysql
      DB_PORT: 3306
      DB_DATABASE: nlp_content
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-nlp_root_2024}
      REDIS_HOST: nlp-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nlp_redis_2024}
      TZ: Asia/Shanghai
    networks:
      - app-network
    depends_on:
      nlp-mysql:
        condition: service_healthy
      nlp-redis:
        condition: service_healthy

  # 开发模式前端：Vite dev server，volume 挂载源码
  # 生产模式：使用 nlp-nginx 镜像内置构建产物
  nlp-frontend:
    image: node:20-alpine
    container_name: nlp-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:9501
      VITE_BACKEND_URL: http://nlp-backend:9501
    networks:
      - app-network
    depends_on:
      - nlp-backend

  # 生产/预发反代：前端 SPA + /api 反代 + SSE
  # 本地开发期可选启动；生产模式下为主入口（80 对外）
  nlp-nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    container_name: nlp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      - nlp-backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
